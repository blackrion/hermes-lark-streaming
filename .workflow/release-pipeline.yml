version: '1.0'
name: release-pipeline
displayName: 自动发版流水线
triggers:
  trigger: auto
  push:
    branches:
      precise:
        - github_sync
variables:
  global:
    - OWNER
    - TOKEN
stages:
  - name: release-stage
    displayName: 创建 Gitee 发行版
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      # ─────────────────────────────────────────────────────────────
      # 单步骤完成：计算版本号 + 调 Gitee API 创建 Release（自动创建 tag）
      # ─────────────────────────────────────────────────────────────
      # 为什么不用 release@gitee 插件？
      #   release@gitee 的参数字段（releaseName/tagName/description）只解析
      #   「配置时已知的变量」（系统变量如 ${GITEE_PIPELINE_BUILD_NUMBER}），
      #   不解析运行时通过 GITEE_PARAMS 写入的自定义变量。实测
      #   ${RELEASE_VERSION} 在插件参数里为空，导致 tag/releaseName 都变成 "v"。
      #
      # 为什么不用 git tag + git push？
      #   CI 环境（Gitee Go python-build 容器）没有 git 凭据，
      #   git push origin <tag> 报 "could not read Username for https://gitee.com"。
      #
      # 最终方案：只调 Gitee Open API 创建 Release：
      #   - tag_name = v{version}
      #   - target_commitish = GITEE_COMMIT（系统变量，当前 commit SHA）
      #   - Gitee API 会在创建 Release 时自动创建对应的 tag（如果不存在）
      #   - 所有变量在 Python 进程里通过 os.environ 读取，不经过插件模板引擎
      #
      # 实际逻辑放在 scripts/create_release.py（避免在 YAML 块标量里
      # 嵌入复杂多行 Python 字符串导致 YAML 解析失败）。
      - step: build@python
        name: create_release
        displayName: 计算版本号并创建 Release
        pythonVersion: '3.11'
        commands:
          - |
            set -e

            # ── 调试：打印环境变量（排查变量注入问题）──
            echo "=== 环境变量检查 ==="
            echo "OWNER=[${OWNER:-<未设置>}]"
            echo "TOKEN=[${TOKEN:+<已设置，长度 ${#TOKEN}>}]"
            echo "REPO=[${REPO:-<未设置>}]"
            # 打印所有可能的 GITEE_ 系统变量（用于调试，不打印 TOKEN 值）
            env | grep -E "^(GITEE_|GO_)" | grep -v -i "token" | head -20 || echo "(无 GITEE_/GO_ 系统变量)"

            # ── 兜底：如果通用变量未注入，尝试从 GITEE_PARAMS 文件读取 ──
            # 通用变量是项目级，需要「关联流水线」才会注入环境变量。
            # 如果用户没关联，可以改在流水线「参数设置」里配 OWNER/TOKEN，
            # 它们会写入 GITEE_PARAMS 文件。这里做兜底读取。
            if [ -z "$OWNER" ] && [ -f GITEE_PARAMS ]; then
              OWNER=$(grep '^OWNER=' GITEE_PARAMS 2>/dev/null | head -1 | sed 's/^OWNER=//; s/^"//; s/"$//') || true
              if [ -n "$OWNER" ]; then
                export OWNER
                echo "ℹ️  从 GITEE_PARAMS 读取 OWNER"
              fi
            fi
            if [ -z "$TOKEN" ] && [ -f GITEE_PARAMS ]; then
              TOKEN=$(grep '^TOKEN=' GITEE_PARAMS 2>/dev/null | head -1 | sed 's/^TOKEN=//; s/^"//; s/"$//') || true
              if [ -n "$TOKEN" ]; then
                export TOKEN
                echo "ℹ️  从 GITEE_PARAMS 读取 TOKEN"
              fi
            fi

            # ── 运行发版脚本 ──
            python3 scripts/create_release.py
        notify: []
        strategy:
          retry: '0'
