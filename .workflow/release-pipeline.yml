version: '1.0'
name: release-pipeline
displayName: 自动发版流水线

# 当代码推送到 github_sync 分支时触发
triggers:
  push:
    branches:
      precise: [github_sync]

stages:
  - name: release-stage
    displayName: 创建 Gitee 发行版
    trigger: auto
    steps:
      - step: shell@agent
        name: create_release
        displayName: 读取版本号并创建 Gitee Release
        inputs:
          script: |
            #!/bin/bash
            set -e

            # ── 1. 读取版本号 ──
            VERSION=$(grep '^version:' plugin.yaml | sed 's/version: *"\(.*\)"/\1/')
            TAG="v${VERSION}"
            echo "📦 版本号: $VERSION (tag: $TAG)"

            # ── 2. 检查 tag 是否已存在 ──
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "📌 Tag $TAG 已存在，跳过 Release 创建"
              exit 0
            fi

            # ── 3. 打 tag 并推送 ──
            git tag "$TAG"
            git push origin "$TAG"
            echo "✅ Tag $TAG 已创建"

            # ── 4. 从 CHANGELOG.md 提取 release notes ──
            python3 << 'PYEOF'
            import re
            import subprocess

            # 读版本号
            result = subprocess.run(
                ["grep", "^version:", "plugin.yaml"],
                capture_output=True, text=True
            )
            version = result.stdout.split('"')[1] if '"' in result.stdout else result.stdout.split(':')[1].strip()
            tag = f"v{version}"
            print(f"📦 读取版本号: {version} (tag: {tag})")

            # 提取 CHANGELOG
            with open("docs/CHANGELOG.md", "r") as f:
                content = f.read()
            pattern = rf"(## v{re.escape(version)}.*?)(?=\n## v|\Z)"
            match = re.search(pattern, content, re.DOTALL)
            if match:
                notes = match.group(1).strip()
            else:
                notes = f"## v{version}\n\n详见 CHANGELOG.md"

            with open("/tmp/release_notes.md", "w") as f:
                f.write(notes)
            print("📝 Release notes 已提取到 /tmp/release_notes.md")
            PYEOF

            # ── 5. 调用 Gitee Release API 创建发行版 ──
            # GITEE_OWNER 和 GITEE_TOKEN 需要在 Gitee Go 流水线环境变量中配置
            # Gitee 会自动生成 Source code (zip) 和 Source code (tar.gz)
            NOTES=$(cat /tmp/release_notes.md)

            RESPONSE=$(curl -s -X POST \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/hermes-lark-streaming/releases" \
              -H "Content-Type: application/json;charset=UTF-8" \
              -d "{
                \"access_token\": \"${GITEE_TOKEN}\",
                \"tag_name\": \"${TAG}\",
                \"name\": \"${TAG}\",
                \"body\": \"$(echo "$NOTES" | sed ':a;N;$!ba;s/\n/\\n/g' | sed 's/\"/\\\\"/g')\",
                \"target_commitish\": \"github_sync\",
                \"prerelease\": false
              }")

            echo "📋 Gitee API 响应: $RESPONSE"
            echo "✅ Gitee Release $TAG 创建完成"
            echo "   源码 zip 和 tar.gz 会自动生成"
            echo "   查看: https://gitee.com/${GITEE_OWNER}/hermes-lark-streaming/releases"
