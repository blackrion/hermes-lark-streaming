name: Sync from Gitee

on:
  schedule:
    - cron: '44 * * * *'
  workflow_dispatch:
    inputs:
      force_tests:
        description: '强制运行测试（即使无变更）'
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "gitee-sync"
          git config user.email "sync@example.com"

      - name: Record pre-sync SHA
        id: pre_sync
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Sync from Gitee github_sync branch
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}.git
          git fetch gitee

          BRANCH=$(git branch --show-current)

          # v1.1.0: 从 Gitee github_sync 分支同步（稳定发布分支）
          if git merge gitee/github_sync --no-edit --strategy-option theirs 2>/dev/null; then
            echo "✅ Merge succeeded (gitee/github_sync → $BRANCH)"
          else
            echo "⚠️ Merge conflict, resetting to gitee/github_sync"
            git merge --abort 2>/dev/null || true
            git reset --hard gitee/github_sync
          fi

          git push origin "$BRANCH"

      - name: Detect changes
        id: detect
        run: |
          SHA_BEFORE="${{ steps.pre_sync.outputs.sha }}"
          SHA_AFTER=$(git rev-parse HEAD)
          if [ "$SHA_BEFORE" != "$SHA_AFTER" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --name-only "$SHA_BEFORE" "$SHA_AFTER" > changed_files.txt
            # 提取提交日志（oneline 格式，最多 10 条）
            git log "$SHA_BEFORE".."$SHA_AFTER" --pretty=format:"%s" --max-count=10 > commit_log.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "" > commit_log.txt
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        id: run_tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test_report.xml 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ── v1.1.0: 自动创建 GitHub Release ──
      # 同步 + 测试通过后，读取 plugin.yaml 版本号，
      # 如果该版本的 tag 不存在则自动打 tag + 创建 Release。
      # 用户不需要手动打 tag，只需在 Gitee github_sync 分支更新 plugin.yaml 版本号。
      - name: Read version from plugin.yaml
        if: steps.detect.outputs.has_changes == 'true' && steps.run_tests.outputs.exit_code == '0'
        id: version
        run: |
          VERSION=$(grep '^version:' plugin.yaml | sed 's/version: *"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Detected version: $VERSION (tag: v$VERSION)"

      - name: Check if tag already exists
        if: steps.detect.outputs.has_changes == 'true' && steps.run_tests.outputs.exit_code == '0'
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "📌 Tag $TAG already exists, skipping Release creation"
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
            echo "🆕 Tag $TAG does not exist, will create Release"
          fi

      - name: Extract release notes from CHANGELOG
        if: steps.detect.outputs.has_changes == 'true' && steps.run_tests.outputs.exit_code == '0' && steps.check_tag.outputs.tag_exists == 'false'
        id: release_notes
        run: |
          # 从 CHANGELOG.md 提取当前版本的 release notes
          # 格式：## v1.1.0 (2026-06-17) 到下一个 ## v 之间的内容
          VERSION="${{ steps.version.outputs.version }}"
          python3 -c "
          import re
          with open('docs/CHANGELOG.md', 'r') as f:
            content = f.read()
          # 匹配 ## v{version} 到下一个 ## v 之间的内容
          pattern = rf'(## v{re.escape(VERSION)}.*?)(?=\n## v|\Z)'
          match = re.search(pattern, content, re.DOTALL)
          if match:
            notes = match.group(1).strip()
          else:
            notes = f'## v{VERSION}\n\nSee [CHANGELOG.md](docs/CHANGELOG.md) for details.'
          with open('release_notes.md', 'w') as f:
            f.write(notes)
          "
          echo "📝 Release notes extracted to release_notes.md"

      - name: Create GitHub Release
        if: steps.detect.outputs.has_changes == 'true' && steps.run_tests.outputs.exit_code == '0' && steps.check_tag.outputs.tag_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Feishu
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          TRIGGER: ${{ github.event_name }}
          FORCE: ${{ inputs.force_tests || 'false' }}
        run: python3 scripts/notify_feishu.py
