name: Sync from Gitee

on:
  schedule:
    - cron: '44 * * * *'
  workflow_dispatch:
    inputs:
      force_tests:
        description: '强制运行测试（即使无变更）'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ━━━━━━ 阶段 1: 同步 ━━━━━━

      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "gitee-sync"
          git config user.email "sync@example.com"

      - name: Record pre-sync SHA
        id: pre_sync
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Sync from Gitee
        run: |
          git remote add gitee https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/${{ secrets.GITEE_USERNAME }}/${{ github.event.repository.name }}.git
          git fetch gitee
          git checkout master
          git merge gitee/master --no-edit
          git push origin $(git branch --show-current)

      # ━━━━━━ 阶段 2: 变更检测 ━━━━━━

      - name: Detect changes
        id: detect
        run: |
          SHA_BEFORE="${{ steps.pre_sync.outputs.sha }}"
          SHA_AFTER=$(git rev-parse HEAD)

          if [ "$SHA_BEFORE" != "$SHA_AFTER" ]; then
            echo "✅ Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            git diff --name-only "$SHA_BEFORE" "$SHA_AFTER" > changed_files.txt
            cat changed_files.txt
          else
            echo "ℹ️ No new changes, skipping"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      # ━━━━━━ 阶段 3: 测试 ━━━━━━

      - name: Set up Python
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        id: run_tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test_report.xml 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ━━━━━━ 阶段 4: 飞书通知（仅有变更时） ━━━━━━

      - name: Notify Feishu
        if: steps.detect.outputs.has_changes == 'true' || inputs.force_tests == true
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          TRIGGER: ${{ github.event_name }}
          FORCE: ${{ inputs.force_tests || 'false' }}
        run: python3 << 'PYEOF'
          import os, json, hmac, hashlib, base64, time, urllib.request
          import xml.etree.ElementTree as ET

          # ── 飞书签名 ──
          timestamp = str(int(time.time()))
          string_to_sign = f"{timestamp}\n{os.environ['FEISHU_SECRET']}"
          hmac_code = hmac.new(
              string_to_sign.encode("utf-8"),
              digestmod=hashlib.sha256,
          ).digest()
          sign = base64.b64encode(hmac_code).decode("utf-8")

          test_exit_code = os.environ.get("TEST_EXIT_CODE", "")
          trigger = os.environ["TRIGGER"]
          force = os.environ.get("FORCE", "false")
          repo = os.environ["REPO"]
          run_url = f"{os.environ['SERVER_URL']}/{repo}/actions/runs/{os.environ['RUN_ID']}"

          trigger_label = "⏰ 定时同步" if trigger == "schedule" else "👆 手动触发"
          if force == "true":
              trigger_label += "（强制测试）"

          # ── 解析 JUnit XML ──
          per_file_summary = []
          total_tests = total_failures = total_errors = total_skipped = 0

          try:
              tree = ET.parse("test_report.xml")
              root = tree.getroot()

              file_map = {}
              for tc in root.iter("testcase"):
                  cn = tc.get("classname", "unknown")
                  short = cn.replace(".", "/") + ".py"
                  if short not in file_map:
                      file_map[short] = {"total": 0, "fail": 0, "error": 0, "skip": 0}
                  file_map[short]["total"] += 1
                  if tc.find("failure") is not None:
                      file_map[short]["fail"] += 1
                  if tc.find("error") is not None:
                      file_map[short]["error"] += 1
                  if tc.find("skipped") is not None:
                      file_map[short]["skip"] += 1

              for fname, counts in sorted(file_map.items()):
                  s = "❌" if counts["fail"] + counts["error"] > 0 else "✅"
                  parts = [f"{counts['total']} ran"]
                  if counts["fail"] > 0:
                      parts.append(f"{counts['fail']} failed")
                  if counts["error"] > 0:
                      parts.append(f"{counts['error']} errors")
                  if counts["skip"] > 0:
                      parts.append(f"{counts['skip']} skipped")
                  per_file_summary.append(f"{s} `{fname}` — {', '.join(parts)}")

              total_tests = sum(c["total"] for c in file_map.values())
              total_failures = sum(c["fail"] for c in file_map.values())
              total_errors = sum(c["error"] for c in file_map.values())
              total_skipped = sum(c["skip"] for c in file_map.values())

          except Exception as e:
              per_file_summary = [f"⚠️ 无法解析测试报告: {e}"]

          # ── 状态判定 ──
          passed = test_exit_code == "0"
          status_icon = "✅" if passed else "❌"
          status_text = "PASSED" if passed else "FAILED"
          color = "turquoise" if passed else "red"
          summary_line = f"{total_tests} tests, {total_failures} failures, {total_errors} errors, {total_skipped} skipped"

          # ── 读取变更文件 ──
          changed_files = ""
          try:
              with open("changed_files.txt", "r") as f:
                  changed_files = f.read().strip()[:800]
          except Exception:
              pass

          # ── 读取失败详情 ──
          failure_details = ""
          if not passed:
              try:
                  with open("test_output.txt", "r") as f:
                      lines = f.readlines()
                      failure_lines = []
                      for i, line in enumerate(lines):
                          if "FAILED" in line:
                              start = max(0, i - 1)
                              end = min(len(lines), i + 6)
                              failure_lines.extend(lines[start:end])
                              failure_lines.append("...")
                      failure_details = "".join(failure_lines[-30:]).replace("`", "'")
              except Exception:
                  failure_details = "无法读取失败详情"

          # ── 构建卡片 ──
          elements = [
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": (
                          f"**同步**: ✅ 新代码已推送\n"
                          f"**测试**: {status_icon} {status_text}\n"
                          f"**触发**: {trigger_label}\n"
                          f"**仓库**: {repo} `master`\n"
                          f"**汇总**: {summary_line}"
                      ),
                  },
              },
              {"tag": "hr"},
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": "**📋 各脚本结果**:\n" + "\n".join(per_file_summary),
                  },
              },
          ]

          if changed_files:
              elements.append({"tag": "hr"})
              elements.append({
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"**🔄 变更文件**:\n{changed_files}",
                  },
              })

          if failure_details:
              elements.append({"tag": "hr"})
              elements.append({
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": f"**❌ 失败详情**:\n```\n{failure_details[:1500]}\n```",
                  },
              })

          elements.append({"tag": "hr"})
          elements.append({
              "tag": "action",
              "actions": [{
                  "tag": "button",
                  "text": {"tag": "plain_text", "content": "🔗 查看 Actions 详情"},
                  "url": run_url,
                  "type": "primary",
              }],
          })

          payload = {
              "timestamp": timestamp,
              "sign": sign,
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {
                          "tag": "plain_text",
                          "content": f"{status_icon} 同步+测试报告 - hermes-lark-streaming",
                      },
                      "template": color,
                  },
                  "elements": elements,
              },
          }

          # ── 发送 ──
          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              os.environ["FEISHU_WEBHOOK"],
              data=data,
              headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"✅ Feishu notified: {resp.read().decode()}")
          except Exception as e:
              print(f"❌ Failed to notify Feishu: {e}")
          PYEOF
