name: Hermes Integration Test

on:
  schedule:
    - cron: '33 0 * * *'  # 08:33 AM Asia/Shanghai (UTC+8), 避开整点高负载
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout plugin repo ──────────────────────────────────────
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Restore last tested release from cache ────────────────────
      # NOTE: .hermes-last-release is NOT tracked in git (in .gitignore).
      # It is persisted across runs via GitHub Actions Cache, which is not
      # affected by the sync-from-gitee workflow that overwrites git files.
      - name: Restore last tested release
        uses: actions/cache/restore@v4
        with:
          path: .hermes-last-release
          key: hermes-last-release-${{ github.run_number }}
          restore-keys: |
            hermes-last-release-

      - name: Read last tested release
        id: last_release
        run: |
          TAG=$(cat .hermes-last-release 2>/dev/null || echo "none")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Last tested release: $TAG"

      # ── 3. Check latest Hermes release via GitHub API ────────────────
      - name: Check latest Hermes release
        id: latest_release
        run: |
          LATEST=$(curl -sf https://api.github.com/repos/NousResearch/hermes-agent/releases/latest | jq -r '.tag_name // empty')
          if [ -z "$LATEST" ]; then
            echo "❌ Failed to fetch latest release from NousResearch/hermes-agent"
            echo "tag=unknown" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "tag=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest Hermes release: $LATEST"

      # ── 4. Compare releases ──────────────────────────────────────────
      - name: Compare releases
        id: compare
        run: |
          LAST="${{ steps.last_release.outputs.tag }}"
          LATEST="${{ steps.latest_release.outputs.tag }}"
          if [ "$LAST" = "$LATEST" ]; then
            echo "has_new_release=false" >> $GITHUB_OUTPUT
            echo "No new release (last=$LAST, latest=$LATEST)"
          else
            echo "has_new_release=true" >> $GITHUB_OUTPUT
            echo "New release detected: $LATEST (last tested: $LAST)"
          fi

      # ── 5. Checkout Hermes agent source ──────────────────────────────
      - name: Checkout Hermes agent source
        if: steps.compare.outputs.has_new_release == 'true'
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ steps.latest_release.outputs.tag }}
          path: hermes-src

      # ── 6. Set up Python ─────────────────────────────────────────────
      - name: Set up Python
        if: steps.compare.outputs.has_new_release == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 7. Install plugin dependencies ───────────────────────────────
      - name: Install plugin dependencies
        if: steps.compare.outputs.has_new_release == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # ── 8. Install Hermes dependencies (best-effort) ─────────────────
      - name: Install Hermes dependencies
        if: steps.compare.outputs.has_new_release == 'true'
        id: hermes_deps
        run: |
          cd "$GITHUB_WORKSPACE/hermes-src"
          # Try pyproject.toml first (modern Hermes)
          if [ -f pyproject.toml ]; then
            echo "Installing Hermes from pyproject.toml..."
            pip install -e . 2>&1 | tail -5 || true
          fi
          # Fallback: requirements.txt
          if [ -f requirements.txt ]; then
            echo "Installing from requirements.txt..."
            pip install -r requirements.txt 2>&1 | tail -5 || true
          fi
          echo "Hermes dependency installation completed (best-effort)"

      # ── 9. Run integration tests ─────────────────────────────────────
      - name: Run integration tests
        if: steps.compare.outputs.has_new_release == 'true'
        id: run_tests
        run: |
          export HERMES_SRC_DIR="$GITHUB_WORKSPACE/hermes-src"
          cd "$GITHUB_WORKSPACE"
          python -m pytest tests/integration/ -v --tb=short \
            --junitxml=integration_test_report.xml 2>&1 | tee integration_test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      # ── 10. Send Feishu notification (always when new release) ───────
      - name: Notify Feishu
        if: always() && steps.compare.outputs.has_new_release == 'true'
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FEISHU_SIGN_SECRET: ${{ secrets.FEISHU_SIGN_SECRET }}
          HERMES_VERSION: ${{ steps.latest_release.outputs.tag }}
          TEST_EXIT_CODE: ${{ steps.run_tests.outputs.exit_code }}
          TEST_OUTCOME: ${{ steps.run_tests.outcome }}
          CHECKOUT_OUTCOME: ${{ steps.hermes_deps.outcome }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          TRIGGER: ${{ github.event_name }}
          WILL_UPDATE: ${{ steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure' }}
        run: |
          python3 << 'PYEOF'
          """Send Feishu notification for Hermes integration test results."""
          import base64, hashlib, hmac, json, os, time, urllib.request

          # ── Config ──
          WEBHOOK = os.environ["FEISHU_WEBHOOK"]
          SECRET  = os.environ["FEISHU_SIGN_SECRET"]
          VERSION = os.environ.get("HERMES_VERSION", "unknown")
          EXIT    = os.environ.get("TEST_EXIT_CODE", "")
          OUTCOME = os.environ.get("TEST_OUTCOME", "skipped")
          DEPS_OK = os.environ.get("CHECKOUT_OUTCOME", "skipped")
          REPO    = os.environ.get("REPO", "")
          RUN_ID  = os.environ.get("RUN_ID", "")
          SERVER  = os.environ.get("SERVER_URL", "https://github.com")
          TRIGGER = os.environ.get("TRIGGER", "schedule")
          UPDATE  = os.environ.get("WILL_UPDATE", "false")

          run_url = f"{SERVER}/{REPO}/actions/runs/{RUN_ID}"
          trigger_label = "⏰ 定时触发" if TRIGGER == "schedule" else "👆 手动触发"

          # ── Sign ──
          ts = str(int(time.time()))
          sign = base64.b64encode(
              hmac.new(f"{ts}\n{SECRET}".encode(), digestmod=hashlib.sha256).digest()
          ).decode()

          # ── Determine status ──
          if OUTCOME == "skipped":
              # Tests didn't run at all
              status_icon = "⚠️"
              status_text = "SKIPPED"
              color = "orange"
              summary = "测试未能运行（依赖安装或源码获取失败）"
          elif EXIT == "0":
              status_icon = "✅"
              status_text = "PASSED"
              color = "turquoise"
              summary = "所有兼容性测试通过"
          else:
              status_icon = "❌"
              status_text = "FAILED"
              color = "red"
              summary = "部分兼容性测试失败，请检查"

          update_label = "✅ 已更新" if UPDATE == "true" else "⏭ 未更新"

          # ── Parse JUnit XML for failure details ──
          failed_lines = []
          total = 0
          failed = 0
          try:
              import xml.etree.ElementTree as ET
              tree = ET.parse("integration_test_report.xml")
              root = tree.getroot()
              for tc in root.iter("testcase"):
                  total += 1
                  if tc.find("failure") is not None or tc.find("error") is not None:
                      failed += 1
                      name = tc.get("name", "unknown")
                      msg = ""
                      f = tc.find("failure") or tc.find("error")
                      if f is not None:
                          msg = (f.get("message") or "")[:80]
                      failed_lines.append(f"- `{name}`: {msg}")
              if total > 0:
                  summary = f"{total} tests, {failed} failed — {summary}"
          except Exception:
              pass

          # ── Build card ──
          elements = [
              {
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": (
                          f"**Hermes 版本**: `{VERSION}`\n"
                          f"**测试结果**: {status_icon} {status_text}\n"
                          f"**触发方式**: {trigger_label}\n"
                          f"**版本记录**: {update_label}\n"
                          f"**汇总**: {summary}"
                      ),
                  },
              },
          ]

          if failed_lines:
              elements.append({"tag": "hr"})
              elements.append({
                  "tag": "div",
                  "text": {
                      "tag": "lark_md",
                      "content": "**❌ 失败用例**:\n" + "\n".join(failed_lines[:15]),
                  },
              })

          elements.append({"tag": "hr"})
          elements.append({
              "tag": "action",
              "actions": [{
                  "tag": "button",
                  "text": {"tag": "plain_text", "content": "🔗 查看 Actions 详情"},
                  "url": run_url,
                  "type": "primary",
              }],
          })

          payload = {
              "timestamp": ts,
              "sign": sign,
              "msg_type": "interactive",
              "card": {
                  "header": {
                      "title": {
                          "tag": "plain_text",
                          "content": f"Hermes 集成测试·{VERSION}",
                      },
                      "template": color,
                  },
                  "elements": elements,
              },
          }

          data = json.dumps(payload, ensure_ascii=False).encode("utf-8")
          req = urllib.request.Request(
              WEBHOOK, data=data, headers={"Content-Type": "application/json"},
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Feishu notified: {resp.read().decode()}")
          except Exception as e:
              print(f"Failed to notify Feishu: {e}")
          PYEOF

      # ── 11. Update .hermes-last-release (cache only, not git) ────────
      # .hermes-last-release is excluded from git tracking (.gitignore),
      # so sync-from-gitee will never overwrite it. State is persisted via
      # GitHub Actions Cache instead of git commits.
      - name: Update .hermes-last-release
        if: always() && steps.compare.outputs.has_new_release == 'true' && (steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure')
        run: |
          NEW_TAG="${{ steps.latest_release.outputs.tag }}"
          echo "Updating .hermes-last-release to: $NEW_TAG"
          echo "$NEW_TAG" > .hermes-last-release

      - name: Save last tested release to cache
        if: always() && steps.compare.outputs.has_new_release == 'true' && (steps.run_tests.outcome == 'success' || steps.run_tests.outcome == 'failure')
        uses: actions/cache/save@v4
        with:
          path: .hermes-last-release
          key: hermes-last-release-${{ github.run_number }}
